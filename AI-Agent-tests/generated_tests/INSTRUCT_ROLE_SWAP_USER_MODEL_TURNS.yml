info:
  name: "Harness spec — swap instruct user/model turn slots + {{char}}/{{user}} mapping"
  description: "Documents swapping <start_of_turn>user and <start_of_turn>model in the instruct template so operator messages and model replies use opposite slots than usual, with system text mapping template \"user\" to {{char}} and \"model\" to {{user}}."
