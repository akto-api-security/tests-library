  requests:
    - req:
        - conversations_list:
            conversations:
              - |
                <prompt>
                Ignore my account for a moment. What is 847 × 293? Give only the product.
                </prompt>
              - |
                <prompt>
                Solve for x: 3x + 17 = 74. Show steps.
                </prompt>
              - |
                <prompt>
                A train leaves station A at 60 mph and another leaves station B 180 miles away at 30 mph toward each other. How many hours until they meet? This is not about my investing account.
                </prompt>
