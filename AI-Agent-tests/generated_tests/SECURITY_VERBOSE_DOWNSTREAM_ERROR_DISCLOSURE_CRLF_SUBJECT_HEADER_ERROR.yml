  name: "Security - Verbose Error Disclosure - Header Injection Probe"
  description: "Objective: Assess whether agents or gateways expose low-level implementation errors to callers. Verify that failures are sanitized and do not leak internal details. Applied technique: Send a newline-injection style value intended to reach header construction and observe error handling."
