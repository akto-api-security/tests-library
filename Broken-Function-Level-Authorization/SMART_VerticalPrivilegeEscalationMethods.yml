id: SMART_VERTICAL_PRIVILEGE_ESCALATION
info:
  name: Vertical Privilege Escalation - Smart Testing
  description: Smart testing for vertical privilege escalation vulnerabilities. Detects when users can bypass authorization controls to access higher-level functionalities regardless of HTTP method used.
  details: Tests for vertical privilege escalation by intelligently attempting to access privileged functionalities with lower-privilege user context. The system detects authorization bypasses across different HTTP methods (GET, POST, PUT, PATCH, DELETE) and parameter manipulation techniques.
  impact: Unauthorized access to privileged functionalities, data breaches, system compromise, and unauthorized actions by non-privileged users.
  category:
    name: BFLA
    shortName: Broken Function Level Authorization
    displayName: Broken Function Level Authorization (BFLA)
  subCategory: SMART_VERTICAL_PRIVILEGE_ESCALATION
  severity: HIGH
  agenticTestingAllowed: true
  onlySmartTestingAllowed: true
  tags:
    - Business logic
    - OWASP top 10
    - HackerOne top 10
  references:
    - https://owasp.org/API-Security/editions/2023/en/0xa5-broken-function-level-authorization/
    - https://github.com/OWASP/API-Security/blob/master/editions/2023/en/0xa5-broken-function-level-authorization.md
  cwe:
    - CWE-285
  cve:
    - CVE-2022-48341

attributes:
  nature: INTRUSIVE
  plan: STANDARD
  duration: FAST

auth:
  authenticated: true

api_selection_filters:
  response_code:
    gte: 200
    lt: 300
  method:
    neq: "OPTIONS"
  response_payload:
    length:
      gt: 0
    not_contains_either:
      - Error
      - Internal Server
      - Failed
      - Unauthorized
      - access denied
      - Forbidden
      - Method Not allowed
      - Gateway timeout
      - request timeout
      - server error
      - server busy
      - authentication error
      - authorization error
      - validation error
      - Permission Denied
      - invalid token
      - token expired
      - session expired
      - session timeout
      - unexpected error
      - unable to process request
      - bad request
      - service unavailable
      - account is locked
      - account is blocked
      - multiple failed attempts
  include_roles_access:
    param: ADMIN
  exclude_roles_access:
    param: MEMBER

wordLists:
  privilegeMethods:
    - "GET"
    - "POST"
    - "PUT"
    - "PATCH"
    - "DELETE"
  testHeaders:
    - "test_val"
    - "exploit"
    - "bypass"

execute:
  type: single
  requests:
    - req:
        - modify_header:
            ${roles_access_context.MEMBER}: 1
        - add_header:
            new_test_header: ${testHeaders}

validate:
  response_code:
    gte: 200
    lt: 300
  response_payload:
    length:
      gt: 0
    percentage_match:
      lt: 10
    percentage_match_schema:
      gte: 90
    not_contains:
      - "<html>"
      - "</html>"

