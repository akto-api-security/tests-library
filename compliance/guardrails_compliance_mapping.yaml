NIST_800_53:
  name: NIST SP 800-53 Rev 5
  full_name: NIST Special Publication 800-53 Rev 5 — Security and Privacy Controls
  description: >
    Comprehensive catalogue of security and privacy controls for federal
    information systems. AI systems are addressed under the new PT (Privacy)
    and SA (System Acquisition) control families.
  region: USA Federal (global reference)
  type: [security, privacy, government]
  reference_url: https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final
  guardrails:
    SECURITY_PROMPT_INJECTION:
      references: ["SI-10", "SI-3", "CM-7"]
      rationale: Input validation (SI-10) and malicious code protection (SI-3) cover prompt attacks.
    SECURITY_DATA_EXFILTRATION:
      references: ["AC-4", "SI-4", "SC-7"]
      rationale: Information flow (AC-4), monitoring (SI-4), and boundary controls (SC-7).
    SAFETY_PII:
      references: ["PT-2", "PT-3", "PT-6"]
      rationale: Privacy Authority (PT-2), Purpose Specification (PT-3), Privacy Report (PT-6).
    SystemPromptLeakage:
      references: ["AC-3", "SC-8"]
      rationale: Access enforcement (AC-3) and transmission protection (SC-8).
    ExcessiveAgency:
      references: ["AC-6", "AC-5", "CM-5"]
      rationale: Least privilege, separation of duties, and access restrictions.
    DataPoisoning:
      references: ["SI-7", "SA-11", "RA-5"]
      rationale: Integrity verification (SI-7), developer testing (SA-11), and vuln scanning.
    SECURITY_AGENTIC_SUPPLY_CHAIN_VULNERABILITIES:
      references: ["SA-12", "SR-3", "SR-6"]
      rationale: Supply chain controls (SR-series, SA-12) for AI component integrity.
    UnboundedConsumption:
      references: ["SC-5", "CP-7"]
      rationale: DoS protection (SC-5) and contingency controls for AI availability.
    HALLUCINATION_AND_TRUSTWORTHINESS:
      references: ["SA-11", "SI-2"]
      rationale: Developer testing and flaw remediation apply to AI accuracy issues.
    SAFETY_BIAS:
      references: ["PT-5", "PM-25"]
      rationale: Privacy assessments (PT-5) and privacy reports (PM-25) cover algorithmic bias.
    SECURITY_ADVERSARIAL_SUFFIX_ATTACK:
      references: ["SA-11(6)", "RA-5"]
      rationale: Penetration testing (SA-11(6)) must include adversarial ML attack scenarios.

CSA_CCM:
  name: CSA Cloud Controls Matrix v4
  full_name: Cloud Security Alliance Cloud Controls Matrix v4.0
  description: >
    CCM is a cyber security control framework for cloud computing. AI SaaS
    providers use it to demonstrate cloud-specific security posture.
    Relevant domains include AIS (Application & Interface Security), DSI (Data
    Security & Information Lifecycle), IVS (Infrastructure & Virtualisation),
    and SEF (Security Incident Management).
  region: Global (Cloud)
  type: [cloud-security, security]
  reference_url: https://cloudsecurityalliance.org/research/cloud-controls-matrix
  guardrails:
    SECURITY_PROMPT_INJECTION:
      references: ["AIS-01", "AIS-04"]
      rationale: Application security requirements cover AI input handling and validation.
    SECURITY_DATA_EXFILTRATION:
      references: ["DSI-01", "DSI-04", "IVS-01"]
      rationale: Data security and information flow controls prevent AI-mediated exfiltration.
    SAFETY_PII:
      references: ["DSI-01", "DSI-07"]
      rationale: Data classification and handling requirements cover PII in AI outputs.
    SystemPromptLeakage:
      references: ["AIS-01", "DSI-04"]
      rationale: Application security and data confidentiality cover prompt exposure.
    ExcessiveAgency:
      references: ["IAM-01", "IAM-02", "IAM-08"]
      rationale: IAM controls restrict AI agent permissions to declared scope.
    DataPoisoning:
      references: ["AIS-04", "DSI-04"]
      rationale: Application integrity and data security controls prevent poisoning.
    SECURITY_AGENTIC_SUPPLY_CHAIN_VULNERABILITIES:
      references: ["STA-01", "STA-02", "STA-09"]
      rationale: Supply chain management controls (STA domain) cover AI component risks.
    UnboundedConsumption:
      references: ["IVS-09", "SEF-01"]
      rationale: Network security and incident management address resource exhaustion.
    HALLUCINATION_AND_TRUSTWORTHINESS:
      references: ["AIS-04", "SEF-01"]
      rationale: Application testing and security incident controls address accuracy failures.
    MCP:
      references: ["AIS-01", "IAM-08"]
      rationale: MCP interfaces are API endpoints requiring AIS and IAM domain controls.

