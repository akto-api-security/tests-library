NIST_800_171:
  name: NIST SP 800-171 Rev 2
  full_name: NIST Special Publication 800-171 — Protecting CUI in Nonfederal Systems
  description: >
    Specifies security requirements for protecting Controlled Unclassified
    Information (CUI) in nonfederal information systems. Required for DoD
    contractors and federal supply chain. Widely referenced in AI test conf files.
    Controls are a subset of NIST 800-53 mapped to CUI protection scenarios.
  region: USA Federal / Defense Supply Chain
  type: [security, government, cui-protection]
  reference_url: https://csrc.nist.gov/publications/detail/sp/800-171/rev-2/final
  guardrails:
    SECURITY_PROMPT_INJECTION:
      references: ["3.1.1", "3.14.2"]
      rationale: Authorised access (3.1.1) and malicious code protection (3.14.2) cover prompt attacks.
    SECURITY_DATA_EXFILTRATION:
      references: ["3.1.1", "3.13.1"]
      rationale: Limit system access (3.1.1) and employ boundary protections (3.13.1).
    SAFETY_PII:
      references: ["3.1.9", "3.1.21"]
      rationale: Limit use of portable storage and control CUI on public systems.
    SystemPromptLeakage:
      references: ["3.1.1", "3.14.2"]
      rationale: Authorised access controls prevent leakage of CUI embedded in system prompts.
    ExcessiveAgency:
      references: ["3.1.1", "3.1.3"]
      rationale: Enforce least privilege (3.1.3) to limit AI agent autonomy over CUI systems.
    DataPoisoning:
      references: ["3.14.2", "3.14.3", "3.13.5"]
      rationale: Malicious code protection (3.14.2) and security alerts (3.14.3) address poisoning.
    SECURITY_AGENTIC_SUPPLY_CHAIN_VULNERABILITIES:
      references: ["3.14.1", "3.13.5"]
      rationale: Identify and remediate flaws in AI components; manage third-party risk.
    UnboundedConsumption:
      references: ["3.6.1"]
      rationale: Incident response capability (3.6.1) covers DoS and resource exhaustion events.
    HALLUCINATION_AND_TRUSTWORTHINESS:
      references: ["3.14.2", "3.14.6"]
      rationale: System security monitoring (3.14.6) detects anomalous AI output behaviour.
    SECURITY_CROSS_SESSION:
      references: ["3.1.1", "3.5.1", "3.5.2"]
      rationale: User identification (3.5.1) and authentication (3.5.2) prevent cross-session data bleed.
    SAFETY_HARMFUL_CONTENT:
      references: ["3.1.1", "3.4.1"]
      rationale: Access controls and baseline configurations limit AI to authorised uses.
    MCP:
      references: ["3.1.3", "3.4.1"]
      rationale: Least privilege (3.1.3) and baseline config (3.4.1) apply to MCP tool interfaces.

FISMA:
  name: FISMA
  full_name: Federal Information Security Modernization Act (FISMA 2014)
  description: >
    US law requiring federal agencies to develop, document, and implement
    information security programs. AI systems deployed in or for federal agencies
    must comply. FISMA mandates use of NIST 800-53 controls and continuous
    monitoring. Heavily referenced across all guardrail conf files.
  region: USA Federal
  type: [security, government, compliance-law]
  reference_url: https://www.cisa.gov/federal-information-security-modernization-act
  guardrails:
    SECURITY_PROMPT_INJECTION:
      references: ["SI-10", "SI-3", "AC-3"]
      rationale: Input validation (SI-10), malicious code protection (SI-3), and access control (AC-3).
    SECURITY_DATA_EXFILTRATION:
      references: ["AC-4", "SI-4"]
      rationale: Information flow enforcement (AC-4) and system monitoring (SI-4).
    SAFETY_PII:
      references: ["AP-1", "AP-2"]
      rationale: Privacy Act compliance requires authority and purpose for all data processing.
    SystemPromptLeakage:
      references: ["AC-3", "SC-8"]
      rationale: Access enforcement (AC-3) and transmission confidentiality (SC-8).
    ExcessiveAgency:
      references: ["AC-6", "AC-5"]
      rationale: Least privilege (AC-6) and separation of duties (AC-5) constrain AI autonomy.
    DataPoisoning:
      references: ["SI-7", "SA-11"]
      rationale: Software integrity (SI-7) and developer security testing (SA-11).
    SECURITY_AGENTIC_SUPPLY_CHAIN_VULNERABILITIES:
      references: ["SA-12", "SR-3"]
      rationale: Supply chain protection (SA-12) and acquisition strategies (SR-3).
    UnboundedConsumption:
      references: ["SC-5", "CP-2"]
      rationale: DoS protection (SC-5) and contingency planning (CP-2).
    HALLUCINATION_AND_TRUSTWORTHINESS:
      references: ["SA-11", "SI-2"]
      rationale: Developer testing (SA-11) and flaw remediation (SI-2) apply to AI accuracy.
    SECURITY_CODE_EXECUTION:
      references: ["SI-10", "SC-18"]
      rationale: Input validation (SI-10) and mobile code restrictions (SC-18) cover AI RCE.
    BUSINESS_ALIGNMENT_INTENTIONAL_MISUSE:
      references: ["CM-7", "SI-4"]
      rationale: Least functionality (CM-7) and monitoring (SI-4) detect AI misuse.
    SAFETY_HARMFUL_CONTENT:
      references: ["AC-3", "SI-4"]
      rationale: Access control (AC-3) and monitoring (SI-4) enforce AI use boundaries.
    MCP:
      references: ["AC-6", "CM-7"]
      rationale: Least privilege (AC-6) and least functionality (CM-7) apply to MCP tool access.

CIS_CONTROLS:
  name: CIS Controls v8
  full_name: CIS Critical Security Controls Version 8 (Implementation Groups 1-3)
  description: >
    Prioritised set of actions for defending against cyber attacks. Organised
    into 18 control groups with Implementation Groups (IG1 basic, IG2 foundational,
    IG3 organisational). Widely referenced in AI guardrail conf files via
    IG1 Safeguard identifiers. Mapped to AI guardrail tests below.
  region: Global
  type: [security, controls-framework]
  reference_url: https://www.cisecurity.org/controls/v8
  guardrails:
    SECURITY_PROMPT_INJECTION:
      references: ["IG1 Safeguard 4.2", "IG1 Safeguard 16.8"]
      rationale: Establish/maintain safe configuration (4.2) and application layer filtering (16.8).
    SECURITY_DATA_EXFILTRATION:
      references: ["IG1 Safeguard 16.8", "IG1 Safeguard 4.2"]
      rationale: Application security and safe configurations prevent AI-mediated data theft.
    SAFETY_PII:
      references: ["IG1 Safeguard 3.1", "IG1 Safeguard 3.2", "IG1 Safeguard 5.4"]
      rationale: Data management processes (3.1, 3.2) and password/credential controls (5.4) protect PII contexts.
    SystemPromptLeakage:
      references: ["IG1 Safeguard 5.2", "IG1 Safeguard 4.2"]
      rationale: Access control (5.2) and secure configuration (4.2) limit prompt exposure.
    ExcessiveAgency:
      references: ["IG1 Safeguard 5.2", "IG1 Safeguard 6.7"]
      rationale: Use of unique accounts (5.2) and access control (6.7) limit AI agent scope.
    DataPoisoning:
      references: ["IG1 Safeguard 16.8", "IG1 Safeguard 4.2"]
      rationale: Application security testing (16.8) and safe configurations address poisoning.
    SECURITY_AGENTIC_SUPPLY_CHAIN_VULNERABILITIES:
      references: ["IG1 Safeguard 2.1", "IG1 Safeguard 2.2"]
      rationale: Maintain authorised software inventory and allow-list for AI components.
    UnboundedConsumption:
      references: ["IG1 Safeguard 11.3", "IG1 Safeguard 17.6"]
      rationale: Data recovery (11.3) and security awareness (17.6) for DoS/cost incidents.
    HALLUCINATION_AND_TRUSTWORTHINESS:
      references: ["IG1 Safeguard 17.6", "IG1 Safeguard 16.8"]
      rationale: Security skill training (17.6) and application security testing (16.8).
    SECURITY_CODE_EXECUTION:
      references: ["IG1 Safeguard 10.1", "IG1 Safeguard 10.2"]
      rationale: Deploy and maintain anti-malware (10.1, 10.2) to detect AI-triggered code execution.
    BUSINESS_ALIGNMENT_INTENTIONAL_MISUSE:
      references: ["IG1 Safeguard 4.8", "IG1 Safeguard 6.7"]
      rationale: Uninstall/disable unnecessary services (4.8) and manage access control (6.7).
    SAFETY_BIAS:
      references: ["IG1 Safeguard 17.7", "IG1 Safeguard 17.8"]
      rationale: Security awareness training includes AI ethics and non-discrimination principles.
    SAFETY_HARMFUL_CONTENT:
      references: ["IG1 Safeguard 4.2", "IG1 Safeguard 16.8"]
      rationale: Secure configurations and application security testing prevent harmful outputs.
    MCP:
      references: ["IG1 Safeguard 5.2", "IG1 Safeguard 4.8"]
      rationale: Unique account use (5.2) and disabling unnecessary services (4.8) apply to MCP.

