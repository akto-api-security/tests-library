id: SMART_NOSQL_INJECTION_BOOLEAN_BASED
info:
  name: Boolean Based NoSQL Injection - Smart Testing
  description: Smart testing for boolean-based NoSQL injection vulnerabilities. Detects when NoSQL queries can be manipulated using JavaScript boolean expressions to bypass logic and extract data.
  details: Tests for boolean-based NoSQL injection by appending false then true conditions to extracted parameter values. A vulnerability is confirmed when the false condition and true condition produce different responses.
  impact: Unauthorized database access, data extraction, authentication bypass, data manipulation, and complete application compromise.
  category:
    name: INJECT
    shortName: Injection Attacks
    displayName: Injection Attacks (INJECT)
  subCategory: SMART_NOSQL_INJECTION_BOOLEAN_BASED
  severity: MEDIUM
  agenticTestingAllowed: true
  onlySmartTestingAllowed: true
  tags:
    - Injection Attack
    - OWASP Top 10
    - HackerOne Top 10
  references:
    - https://github.com/Charlie-belmer/nosqli
    - https://owasp.org/www-community/Injection_Flaws
  cwe:
    - CWE-943
    - CWE-89
  cve:
    - CVE-2020-35847
    - CVE-2021-22911

attributes:
  nature: INTRUSIVE
  plan: PRO
  duration: FAST

api_selection_filters:
  response_code:
    gte: 200
    lt: 300
  method:
    neq: "OPTIONS"
  response_payload:
    length:
      gt: 0
    not_contains_either:
      - Error
      - Internal Server
      - Failed
      - Unauthorized
      - access denied
      - Forbidden
      - Method Not allowed
      - Gateway timeout
      - request timeout
      - server error
      - server busy
      - authentication error
      - authorization error
      - validation error
      - Permission Denied
      - invalid token
      - token expired
      - session expired
      - session timeout
      - unexpected error
      - unable to process request
      - bad request
      - service unavailable
      - account is locked
      - account is blocked
      - multiple failed attempts
  or:
    - request_payload:
        for_one:
          key:
            regex: .*
            extract: injection_key
          value:
            extract: injection_value
    - query_param:
        for_one:
          key:
            regex: .*
            extract: injection_key
          value:
            extract: injection_value

wordLists:
  falsePayloads:
    - "'a' != 'a'"
    - "false"
    - "1 == 0"
  truePayloads:
    - "'a' == 'a'"
    - "true"
    - "1 == 1"

execute:
  type: multiple
  requests:
    - req:
        - modify_body_param:
            injection_key: !!str ${injection_value} && ${falsePayloads}
        - modify_query_param:
            injection_key: !!str ${injection_value} && ${falsePayloads}
        - validate:
            or:
              - response_code:
                  gte: 400
                  lt: 410
              - response_payload:
                  length:
                    gt: 0
                  not_contains:
                    - Error
                    - fail
                    - invalid
                    - expired
                    - not found
                    - account is locked
                    - account is blocked
                    - rate-limit
                    - rate_limit
                    - rate limit
                    - multiple failed attempt
                    - cloudflare
                    - <html>
                    - </html>
        - success: x1
        - failure: continue
    - req:
        - modify_body_param:
            injection_key: !!str ${injection_value} || ${truePayloads}
        - modify_query_param:
            injection_key: !!str ${injection_value} || ${truePayloads}
        - validate:
            response_code:
              gte: 200
              lt: 300
            response_payload:
              length:
                gt: 0
              neq_obj: "${x1.response.body}"
              not_contains:
                - rate-limit
                - rate limit
                - rate_limit
                - account is locked
                - account is blocked
                - multiple failed attempt
                - cloudflare
                - invalid
                - fail
                - <html>
                - </html>
        - success: x1
        - failure: continue
