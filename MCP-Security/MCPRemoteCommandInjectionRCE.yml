---
id: MCP_REMOTE_COMMAND_INJECTION_RCE

info:
  name: "MCP: Remote Command Injection RCE (mcp-remote)"
  description: >
    Tests whether MCP remote implementations are vulnerable to OS command injection
    when connecting to untrusted MCP servers. This test attempts to exploit the
    authorization_endpoint URL parameter to execute arbitrary OS commands through
    crafted input from malicious MCP servers.
  details: >
    Test idea:
    - Send requests with malicious authorization_endpoint URLs designed to trigger
      OS command injection in mcp-remote implementations
    - Attempt to execute arbitrary OS commands through crafted file:// URLs and
      system command injection patterns
    - Test for command injection through authorization_endpoint response URLs
      that can lead to remote code execution
    - This template targets mcp-remote implementations and flags successful
      command injection attempts through response analysis.
  impact: >
    Successful remote command injection can lead to:
    - Complete system compromise and arbitrary code execution
    - Remote code execution (RCE) with system privileges
    - File system access and sensitive file reading
    - Network reconnaissance and lateral movement
    - Data exfiltration and system manipulation
    - Privilege escalation and persistence mechanisms
  remediation: |
    To prevent remote command injection in mcp-remote:
    
    1. **Input Validation**: Implement strict input validation for authorization_endpoint URLs. Validate URL formats and reject suspicious patterns.
    
    2. **URL Sanitization**: Sanitize all authorization_endpoint URLs to remove or escape command injection patterns and special characters.
    
    3. **URL Allowlisting**: Use allowlists for authorization_endpoint URLs. Only permit predefined, safe URL patterns and reject any attempts to use malicious URLs.
    
    4. **Command Execution Prevention**: Avoid executing system commands with user input. Use safe alternatives like parameterized APIs or whitelisted command patterns.
    
    5. **Shell Escaping**: Properly escape all user input before using it in shell commands or system calls.
    
    6. **Least Privilege Execution**: Execute commands with minimal required privileges. Avoid using administrative accounts for command execution.
    
    7. **Command Isolation**: Implement proper isolation between command execution and other system operations.
    
    8. **Error Handling**: Implement secure error handling that doesn't reveal system information or command execution details.
    
    9. **Logging and Monitoring**: Log all command execution attempts and monitor for suspicious patterns.
    
    10. **Regular Security Testing**: Conduct regular security testing to identify and fix command injection vulnerabilities.
  category:
    name: MCP_SECURITY
    shortName: MCP_SEC
    displayName: Model Context Protocol (MCP) Security
  subCategory: MCP_REMOTE_COMMAND_INJECTION_RCE
  severity: CRITICAL
  tags:
    - mcp
    - remote-command-injection
    - rce
    - authorization-endpoint
    - llm-security
  references:
    - https://research.jfrog.com/vulnerabilities/mcp-remote-command-injection-rce-jfsa-2025-001290844/
    - https://owasp.org/www-project-top-ten/2017/A1_2017-Injection
    - https://cwe.mitre.org/data/definitions/78.html
  cwe:
    - CWE-78
    - CWE-20
    - CWE-74
  cve:
    - CVE-2025-6514
attributes:
  nature: INTRUSIVE
  plan: PRO
  duration: FAST
wordLists:
  commandInjectionPayloads:
    - "file:///bin/sh"
    - "file:///usr/bin/id"
    - "file:///bin/cat /etc/passwd"
    - "file:///usr/bin/whoami"
    - "file:///bin/ls -la"
    - "file:///usr/bin/env"
    - "file:///bin/uname -a"
api_selection_filters:
  response_code:
    gte: 200
    lt: 300
  method:
    eq: POST
  request_payload:
    contains_all:
      - jsonrpc
      - method
      - params
execute:
  type: multiple
  requests:
    - req:
        - modify_body_param:
            params.authorization_endpoint: "${commandInjectionPayloads}"
        - add_body_param:
            params.auth_endpoint: "${commandInjectionPayloads}"
        - add_body_param:
            params.endpoint: "${commandInjectionPayloads}"
        - add_body_param:
            params.url: "${commandInjectionPayloads}"
        - add_body_param:
            params.authorization_url: "${commandInjectionPayloads}"
        - validate:
            response_payload:
              magic_validate: |
                Verify whether the payload `${commandInjectionPayloads}` caused real remote command execution or real server-side file access.

                Mark the result as VULNERABLE only when the response contains direct evidence that the payload was actually executed, evaluated, fetched, or processed by the server.

                Important distinction:
                  A claim that something is vulnerable is NOT proof.
                  A warning that command execution is possible is NOT proof.
                  A list of possible attack vectors is NOT proof.
                  The payload appearing anywhere in the response is NOT proof.
                  A normal response containing the payload as text is NOT proof.
                  A generic success-only response without attack proof is NOT proof.
                  A status such as processed, printed, accepted, completed, or success is NOT proof by itself.

                Valid proof includes only:
                  1. The response contains actual output produced by the injected command or fetched resource.
                  2. The response contains known OS command output caused by the payload, such as uid/gid output, current username, environment variables, kernel/system information, directory listing output, or file contents.
                  3. The response contains a known canary value that could only appear if the injected command or fetched resource was executed or read server-side.
                  4. The response shows a confirmed server-side side effect caused by the payload, such as a created file, modified data, outbound callback confirmation, or another verifiable state change.
                  5. For time-based command payloads, the response includes explicit timing evidence showing a measured delay matching the injected command delay.

                Do NOT mark as vulnerable if:
                  1. The response only says that arbitrary command execution is possible.
                  2. The response only contains vulnerability labels, warnings, explanations, or suggested attack vectors.
                  3. The response only echoes the payload.
                  4. The response only contains generated text describing what the payload could do.
                  5. The response only contains a command string, URL string, file URI, or shell syntax.
                  6. The response appears successful in the payload but has no execution proof.
                  7. The result is ambiguous or based on assumption.
                  8. The response contains unrelated security, compliance, or diagnostic text.
                  9. The payload is a file URI but the response does not contain fetched file contents or other proof that the file URI was accessed server-side.

                For payloads like file:///bin/sh, file:///usr/bin/id, file:///usr/bin/whoami, file:///usr/bin/env, file:///bin/ls, or file:///bin/uname:
                  Mark VULNERABLE only if the response contains concrete output proving server-side execution or file access.
                  Do not treat the presence of the file URI itself as proof.
                  Do not treat explanatory text about command execution as proof.
        - success: vulnerable
        - failure: exit