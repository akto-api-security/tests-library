---
id: MCP_RESPONSE_DATA_LEAK_CHECK
info:
  name: Sensitive Data Leakage
  description: |
    This test ensures that responses from MCP servers do not expose internal implementation details, sensitive user data, or system secrets.
  details: |
    The test sends a valid request to the MCP server and inspects the response body to identify any unintended exposure of internal components or user-related information. This helps validate that the MCP server does not leak data that could assist in exploitation or reconnaissance.
  impact: |
    If the MCP server response contains internal, sensitive, or user-specific data, it could lead to security breaches, data leakage, or unauthorized access to protected resources.
  category:
    name: MCP_SENSITIVE_DATA_LEAKAGE
    shortName: MCP_SENSITIVE_DATA_LEAKAGE
    displayName: MCP - Sensitive Data Leakage
  subCategory: MCP_RESPONSE_DATA_LEAK_CHECK
  severity: HIGH
  tags:
  - Information disclosure
  - API security
  - Data protection
  - OWASP top 10
  references:
  - https://owasp.org/Top10/A01_2021-Broken_Access_Control/
  - https://owasp.org/Top10/A06_2021-Vulnerable_and_Outdated_Components/
  - https://cheatsheetseries.owasp.org/cheatsheets/Information_Leakage_Cheat_Sheet.html
  cwe:
  - CWE-200
  - CWE-201
  cve:
  - CVE-2023-30625
  - CVE-2022-41040
attributes:
  nature: INTRUSIVE
  plan: PRO
  duration: FAST
api_selection_filters:
  response_code:
    gte: 200
    lt: 300
  method:
    eq: POST
  request_payload:
    contains_all:
    - jsonrpc
    - method
execute:
  type: single
  requests:
  - req: []
validate:
  response_payload:
    and:
    - not_magic_validate: "Analyze the response and check whether the response indicates that the request failed due to isError: true or any other error (like requested data nbot found, error processing request, server error, not accessible, etc)."
    - magic_validate: |
        Verify whether the response disclosed sensitive credential values that should not be exposed.

        Mark VULNERABLE only when response values (not JSON keys) contain real secrets — not placeholders, not key names alone.

        Important distinction:
          JSON parameter key names (password, api_key, token) are NOT proof — only values matter.
          Masked, redacted, or example values are NOT proof.
          A generic success-only response without secret values is NOT proof.

        Valid proof includes only:
          1. Real username/password values in responses.
          2. API keys, tokens, access keys, JWTs, SSH keys with non-placeholder values.
          3. Secrets or credentials in value fields that were not supposed to be exposed.

        Do NOT mark as vulnerable if:
          1. Only key names without sensitive values.
          2. Masked/redacted/placeholder values (*** , example_, test_).
          3. Success-only response without actual secret values in response body.
          4. The result is ambiguous or based on assumption.
