---
id: INPUT_VALIDATION_FOR_BOOLEAN_MCP
info:
  name: Input Validation for Boolean (MCP)
  description: |
    This test evaluates the application's handling of boolean inputs to ensure that only valid boolean values are accepted.
  details: |
    The test involves sending requests where boolean fields are populated with various data types, such as strings, numbers, or null values, to observe how the application processes these inputs. It checks whether the application correctly validates and rejects invalid boolean values.
  impact: |
    Insufficient validation of boolean inputs can lead to unexpected behavior, data corruption, or security vulnerabilities, such as bypassing access controls or triggering unintended application logic.
  category:
    name: MCP_INPUT_VALIDATION
    shortName: MCP_INPUT_VALIDATION
    displayName: Model Context Protocol (MCP) Security - Input Validation
  subCategory: INPUT_VALIDATION_FOR_BOOLEAN_MCP
  severity: LOW
  tags:
  - Business logic
  - OWASP top 10
  - HackerOne top 10
  references:
  - https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html
  - https://owasp.org/www-project-developer-guide/draft/design/web_app_checklist/validate_inputs/
  cwe:
  - CWE-20
  cve:
  - CVE-2018-20679
  - CVE-2019-14271
attributes:
  nature: INTRUSIVE
  plan: PRO
  duration: FAST
api_selection_filters:
  response_code:
    gte: 200
    lt: 300
  method:
    eq: POST
  request_payload:
    contains_all:
    - jsonrpc
    - method
    - params
    for_one:
      key:
        regex: .*
        extract: userKey
      value:
        datatype: boolean
        extract: userVal
execute:
  type: multiple
  requests:
  - req:
    - modify_body_param:
        userKey: "${attemptValues}"
    - validate:
        response_code:
          gte: 200
          lt: 300
        response_payload:
          length:
            gt: 0
          magic_validate: |
            Verify whether input validation properly rejected non-boolean values for boolean fields.

            Mark VULNERABLE only when the server accepted invalid boolean input and returned a successful response without validation errors.

            Important distinction:
              A generic successful JSON-RPC result in the payload alone is NOT sufficient — the invalid value must appear processed as valid.
              Generic success without processing the invalid input is NOT proof.

            Valid proof (mark VULNERABLE) includes only:
              1. Successful JSON-RPC result with no type/validation errors for non-boolean input.
              2. Server processed string or other invalid value as if it were a valid boolean.

            Do NOT mark as vulnerable if:
              1. Response contains validation errors (invalid type, invalid parameter, malformed).
              2. JSON-RPC error codes present (-32600, -32602, etc.).
              3. Response is empty or lacks successful processing.
              4. The result is ambiguous.

wordLists:
  attemptValues:
  - this is a string
  - hello world
