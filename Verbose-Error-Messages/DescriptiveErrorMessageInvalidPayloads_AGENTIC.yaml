id: DESCRIPTIVE_ERROR_MESSAGE_INVALID_PAYLOAD_AGENTIC
info:
  name: Descriptive Error Message Using invalid payloads
  description: Verifies error messages for sensitive information leakage, specifically preventing the exposure of stack traces,
    enhancing application security.
  details: '"The DESCRIPTIVE_ERROR_MESSAGE test ensures that error messages do not leak sensitive information, specifically
    avoiding the exposure of stack traces.  It verifies that error messages provide useful and informative feedback without
    disclosing implementation details, reducing the risk of exposing vulnerabilities and aiding in maintaining the security
    and integrity of the application."

    '
  impact: This information can be used to facilitate more sophisticated attacks on your application
  category:
    name: VEM_AGENTIC
    shortName: Verbose Error Messages
    displayName: Verbose Error Messages (VEM)
  subCategory: DESCRIPTIVE_ERROR_MESSAGE_INVALID_PAYLOAD
  severity: LOW
  tags:
  - Business logic
  - OWASP top 10
  - HackerOne top 10
  references:
  - https://owasp.org/www-community/Improper_Error_Handling
  cwe:
  - CWE-209
  - CWE-200
  cve:
  - CVE-2020-11883
  - CVE-2020-15652
attributes:
  nature: INTRUSIVE
  plan: STANDARD
  duration: FAST
api_selection_filters:
  method:
    eq: POST
  response_payload:
    not_contains:
    - column
    - row
    - line
    - function
    - class
    - stacktrace
    length:
      gt: 0
execute:
  type: single
  requests:
  - req:
    - replace_body: random payload containing 5s3c1@al characters and emojis😊
validate:
  or:
  - response_payload:
      contains_either:
      - 'TypeError: Cannot'
      - 'SyntaxError: Unexpected'
      - 'ReferenceError:'
  - response_payload:
      contains_either:
      - 'ValueError: invalid'
      - 'TypeError: unsupported'
      - 'KeyError: '
  - response_payload:
      contains_either:
      - java.lang.NullPointerException
      - java.lang.ArrayIndexOutOfBoundsException
      - java.lang.IllegalArgumentException
  - response_payload:
      contains_either:
      - System.NullReferenceException
      - System.IndexOutOfRangeException
      - System.InvalidOperationException
  - response_payload:
      contains_either:
      - 'Fatal error: Call'
      - 'Parse error: syntax error'
      - 'Exception: '
  - response_payload:
      contains_either:
      - 'RuntimeError: '
      - 'NoMethodError: '
      - 'ArgumentError: '
  - response_payload:
      contains_either:
      - 'panic: runtime error'
